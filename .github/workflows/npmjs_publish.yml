name: Publish Node Package to npmjs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.2). Use with --dry-run for testing.'
        required: true
      dry_run:
        description: 'Dry run (do not actually publish)'
        type: boolean
        default: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify Node and npm versions
        run: |
          echo "Node version:"
          node --version
          echo "npm version:"
          npm --version

      # Javascript
      - name: Install Javascript dependencies
        working-directory: sdks/v2/javascript
        run: npm install

      - name: Set Javascript package version
        working-directory: sdks/v2/javascript
        run: npm version ${{ github.event.release.tag_name || github.event.inputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish Core Javascript package to npmjs
        run: npm publish --access public --loglevel verbose --tag ${{ contains(github.event.release.tag_name || github.event.inputs.version, '-') && 'next' || 'latest' }} ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        working-directory: sdks/v2/javascript

      # Typescript
      - name: Install Typescript dependencies
        working-directory: sdks/v2/typescript
        run: npm install

      - name: Set Typescript package version
        working-directory: sdks/v2/typescript
        run: npm version ${{ github.event.release.tag_name || github.event.inputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish Core Typescript package to npmjs
        run: npm publish --access public --loglevel verbose --tag ${{ contains(github.event.release.tag_name || github.event.inputs.version, '-') && 'next' || 'latest' }} ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        working-directory: sdks/v2/typescript
