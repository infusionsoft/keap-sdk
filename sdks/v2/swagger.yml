          type: array
          description: List of CC email addresses
          example:
          - cc1@example.com
          - cc2@example.com
          items:
            type: string
        sent_to_bcc_address_list:
          type: array
          description: List of BCC email addresses
          example:
          - bcc@example.com
          items:
            type: string
