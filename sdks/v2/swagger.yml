          type: string
          description: The reply-to email address
          example: reply@company.com
        sent_time:
          type: string
          format: date-time
          description: When the email was sent, in ISO-8601 format
          example: '2024-05-21T14:30:00Z'
        received_time:
          type: string
          format: date-time
          description: When the email was received, in ISO-8601 format
          example: '2024-05-21T14:31:00Z'
        opened_time:
          type: string
          format: date-time
          description: When the email was opened, in ISO-8601 format
          example: '2024-05-21T15:00:00Z'
        clicked_time:
          type: string
          format: date-time
          description: When a link in the email was clicked, in ISO-8601 format
          example: '2024-05-21T15:05:00Z'
        plain_content:
          type: string
          description: Base64 encoded text
          example: V2VsY29tZSB0byBvdXIgc2VydmljZQ==
        html_content:
          type: string
          description: Base64 encoded HTML
          example: PGgxPldlbGNvbWU8L2gxPg==
        original_provider:
          type: string
          description: Provider that sent the email, defaults to UNKNOWN
          enum:
          - UNKNOWN
          - INFUSIONSOFT
          - MICROSOFT
          - GOOGLE
          example: INFUSIONSOFT
        original_provider_id:
          type: string
          description: Provider id that sent the email, must be unique when combined
