    AchieveGoalRequest:
      type: object
      description: Request to achieve a goal in an automation. You must provide EITHER
        (integration + call_name) OR (automation_id + goal_id), along with contact_id.
      properties:
        integration:
          type: string
          description: The integration name of the goal. Required when using integration/call_name
            approach. Use together with 'call_name'. Mutually exclusive with automation_id/goal_id.
          example: my_integration
        call_name:
          type: string
          description: The call name of the goal. Required when using integration/call_name
            approach. Use together with 'integration'. Mutually exclusive with automation_id/goal_id.
          example: goal_achieved
        automation_id:
          type: integer
          format: int64
          description: The automation ID. Required when using automation_id/goal_id
            approach. Use together with 'goal_id'. Mutually exclusive with integration/call_name.
          example: 123
        goal_id:
          type: integer
          format: int64
          description: The goal ID within the automation. Required when using automation_id/goal_id
            approach. Use together with 'automation_id'. Mutually exclusive with integration/call_name.
          example: 456
        contact_id:
          type: integer
          format: int64
          description: The contact ID for whom to achieve the goal
          example: 789
      required:
      - contact_id
    AchieveGoalResponse:
      type: object
      description: Response containing the results of achieving a goal
      properties:
        results:
          type: array
          description: List of results for each goal that was achieved. Contains information
            about flows started and stopped as a result.
          items:
            $ref: '#/components/schemas/GoalEventResultDTO'
    FlowEventResultDTO:
      type: object
      description: Result of a flow being started or stopped
      properties:
        success:
          type: boolean
          description: Whether the flow operation was successful
          example: true
        message:
          type: string
          description: A message with details about the flow operation
          example: Flow started successfully
        flow_id:
          type: integer
          format: int64
          description: The flow ID that was affected
          example: 789
    GoalEventResultDTO:
      type: object
      description: Result of achieving a specific goal
      properties:
        success:
          type: boolean
          description: Whether the goal was successfully achieved
          example: true
        message:
          type: string
          description: A message with details about the result
          example: Goal achieved successfully
        automation_id:
          type: integer
          format: int64
          description: The automation ID where the goal was achieved
          example: 123
        goal_id:
          type: integer
          format: int64
          description: The goal ID that was achieved
          example: 456
        flow_start_results:
          type: array
          description: List of flows that were started as a result of achieving this
            goal
          items:
            $ref: '#/components/schemas/FlowEventResultDTO'
        flow_stop_results:
          type: array
          description: List of flows that were stopped as a result of achieving this
            goal
          items:
            $ref: '#/components/schemas/FlowEventResultDTO'
