components:
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        status:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetails'
    ErrorDetails:
      type: object
      properties:
        domain:
          type: string
        resource:
          type: string
    UnpublishAutomationRequest:
      type: object
      description: Request to unpublish a single automation
      properties:
        unpublished_form_message:
          type: string
          description: Custom message to display on forms when the automation is unpublished
          example: This form is currently unavailable
    CreateTaskRequest:
      type: object
      description: task
      properties:
        title:
          type: string
          description: Task title
          example: Follow up on proposal
        description:
          type: string
          description: Task description
          example: Review client feedback
        type:
          type: string
          description: Task type
          example: CALL
        priority:
          type: string
          description: Task priority
          enum:
          - CRITICAL
          - ESSENTIAL
          - NONESSENTIAL
          example: ESSENTIAL
        completed:
          type: boolean
          description: Whether task is completed
          example: false
        completion_time:
          type: string
          description: Completion timestamp (ISO-8601)
          example: '2024-03-20T14:00:00Z'
        due_time:
          type: string
          description: Due date/time (ISO-8601)
          example: '2024-03-18T17:00:00Z'
        remind_time_mins:
          type: integer
          format: int32
          description: Value in minutes before start_date to show pop-up reminder.
          enum:
          - '5'
          - '10'
          - '15'
          - '30'
          - '60'
          - '120'
          - '240'
          - '480'
          - '1440'
          - '2880'
          example: 30
        assigned_to_user_id:
          type: string
          description: Assigned user ID
          example: 456
        contact_id:
          type: string
          description: Associated contact ID
          example: 1001
      required:
      - assigned_to_user_id
    Task:
      type: object
      properties:
        id:
          type: string
          description: Task ID
          example: 123
        title:
          type: string
          description: Task title
          example: Follow up on proposal
        description:
          type: string
          description: Task description
          example: Review and respond to client feedback
        type:
          type: string
          description: Task type
          example: CALL
        priority:
          type: string
          description: Task priority
          enum:
          - CRITICAL
          - ESSENTIAL
          - NONESSENTIAL
          example: CRITICAL
        completed:
          type: boolean
          description: Whether task is completed
          example: false
        create_time:
          type: string
          description: Creation timestamp (ISO-8601)
          example: '2024-01-10T08:00:00Z'
        modification_time:
          type: string
          description: Last modification timestamp (ISO-8601)
          example: '2024-03-15T10:30:00Z'
        completion_time:
          type: string
          description: Completion timestamp (ISO-8601)
          example: '2024-03-20T14:00:00Z'
        due_time:
          type: string
          description: Due date/time (ISO-8601)
          example: '2024-03-18T17:00:00Z'
        remind_time_mins:
          type: integer
          format: int32
          description: Reminder minutes before due.
          enum:
          - '5'
          - '10'
          - '15'
          - '30'
          - '60'
          - '120'
          - '240'
          - '480'
          - '1440'
          - '2880'
          example: 30
        assigned_to_user_id:
          type: string
          description: Assigned user ID
          example: 456
        created_by_user_id:
          type: string
          description: Creator user ID
          example: 789
        contact_id:
          type: string
          description: Associated contact ID
          example: 1001
    CreateCustomFieldOptionRequest:
      type: object
      properties:
        label:
          type: string
    CreateCustomFieldRequest:
      type: object
      properties:
        label:
          type: string
        options:
          type: array
          items:
            $ref: '#/components/schemas/CreateCustomFieldOptionRequest'
        field_type:
          type: string
          enum:
          - CURRENCY
          - DATE
          - DATE_TIME
          - DAY_OF_WEEK
          - DECIMAL_NUMBER
          - DRILLDOWN
          - DROPDOWN
          - EMAIL
          - LIST_BOX
          - MONTH
          - NAME
          - PERCENT
          - PHONE_NUMBER
          - RADIO
          - SOCIAL_SECURITY_NUMBER
          - STATE
          - TEXT
          - TEXT_AREA
          - USER
          - USER_LIST_BOX
          - WEBSITE
          - WHOLE_NUMBER
          - YEAR
          - YES_NO
        group_id:
          type: string
          description: An optional tab group to place the field under in the interface.  If
            not specified, will default to the 'Custom Fields' tab.
        user_group_id:
          type: string
          description: An optional user group to choose from when selecting values
            for User or UserListBox fields.
      required:
      - field_type
      - label
    CreateCustomFieldResponse:
      type: object
      properties:
        custom_field:
          $ref: '#/components/schemas/CustomFieldMetaData'
    CustomFieldMetaData:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        options:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldOption'
        record_type:
          type: string
          enum:
          - CONTACT
          - REFERRAL_PARTNER
          - OPPORTUNITY
          - TASK_NOTE_APPOINTMENT
          - COMPANY
          - ORDER
          - SUBSCRIPTION
        field_type:
          type: string
          enum:
          - CURRENCY
          - DATE
          - DATE_TIME
          - DAY_OF_WEEK
          - DECIMAL_NUMBER
          - DRILLDOWN
          - DROPDOWN
          - EMAIL
          - LIST_BOX
          - MONTH
          - NAME
          - PERCENT
          - PHONE_NUMBER
          - RADIO
          - SOCIAL_SECURITY_NUMBER
          - STATE
          - TEXT
          - TEXT_AREA
          - USER
          - USER_LIST_BOX
          - WEBSITE
          - WHOLE_NUMBER
          - YEAR
          - YES_NO
        default_value:
          type: string
        group_id:
          type: string
        field_name:
          type: string
    CustomFieldOption:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
    CategoryReference:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the tag category
          example: 123
      required:
      - id
    CreateUpdateTagRequest:
      type: object
      description: tag
      properties:
        name:
          type: string
          description: Name of the tag, up to 255 characters will be saved
          example: VIP Customer
        description:
          type: string
          description: Description of the tag
          example: High-value customers
        category:
          $ref: '#/components/schemas/CategoryReference'
          description: Category of the tag. If not provided, the tag will not be assigned
            to a category.
    Tag:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for this tag
          example: 123
        name:
          type: string
          description: The unique name of this tag
          example: VIP Customer
        description:
          type: string
          description: A description of this tag
          example: High-value customers
        category:
          $ref: '#/components/schemas/CategoryReference'
          description: The category this tag belongs to
        create_time:
          type: string
          format: date-time
          description: The time this tag was created, in ISO 8601 format
          example: '2024-01-10T08:00:00Z'
        update_time:
          type: string
          format: date-time
          description: The time this tag was last updated, in ISO 8601 format
          example: '2024-03-15T10:30:00Z'
    ApplyRemoveTagRequest:
      type: object
      properties:
        contact_ids:
          type: array
          description: The IDs of the contacts to apply/remove the tag to/from
          example:
          - '123'
          - '456'
          items:
            type: string
          uniqueItems: true
      required:
      - contact_ids
    ApplyTagsResponse:
      type: object
      properties:
        results:
          type: object
          additionalProperties:
            type: string
    CreateUpdateTagCategoryRequest:
      type: object
      description: tagCategory
      properties:
        name:
          type: string
          description: The name of the tag category, must be unique
          example: Customer Segments
        description:
          type: string
          description: A description of the tag category
          example: Tags for customer segmentation
    TagCategory:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for this tag category
          example: 123
        name:
          type: string
          description: The unique name of this tag category
          example: Customer Segments
        description:
          type: string
          description: A description of this tag category
          example: Tags for customer segmentation
        create_time:
          type: string
          format: date-time
          description: The time this tag category was created, in ISO 8601 format
          example: '2024-01-10T08:00:00Z'
        update_time:
          type: string
          format: date-time
          description: The time this tag category was last updated, in ISO 8601 format
          example: '2024-03-15T10:30:00Z'
    AddressRequest_Detail:
      type: object
      properties:
        line1:
          type: string
        line2:
          type: string
        locality:
          type: string
          description: The municipality to which the address belongs
          example: Phoenix
        field:
          type: string
          description: Address type field
          enum:
          - ADDRESS_FIELD_UNSPECIFIED
          - BILLING
          - SHIPPING
          - OTHER
          example: BILLING
        country_code:
          type: string
          description: An ISO 3166-2 Country Code (https://en.wikipedia.org/wiki/ISO_3166-1_alpha-3)
          example: USA
        postal_code:
          type: string
        region_code:
          type: string
          description: An ISO 3166-2 Province Code, such as one of the US States (https://en.wikipedia.org/wiki/ISO_3166-2:US)
          example: US-AZ
    CreateSubscriptionRequest_Detail:
      type: object
      properties:
        quantity:
          type: integer
          format: int32
          description: The subscription quantity. Must be 1 or greater. Default is
            1.
          example: 1
        active:
          type: boolean
          description: If the subscription is active or not. Default is true
          example: true
        contact_id:
          type: string
          description: Id of the contact to create the subscription for.
          example: 123
        subscription_plan_id:
          type: string
          description: Id of the product subscription plan.
          example: 456
        billing_amount:
          type: number
          format: double
          description: The billing amount. Must be 0 or greater. Default is the price
            in the product subscription plan.
          example: 10000
        auto_charge:
          type: boolean
          description: If the subscription should auto charge on the next billing
            date. Default is true.
          example: true
        max_charge_attempts:
          type: integer
          format: int32
          description: Maximum number of charge attempts. Must be 1 or greater. Default
            is the configured [Max Retries] value.
          example: 3
        days_between_retries:
          type: integer
          format: int32
          description: Number of days between charge attempts. Must be 1 or greater.
            Default is the configured [Num Days Between Retries] value.
          example: 5
        start_date:
          type: string
          format: date
          description: The first day the subscription will bill. Must not be in the
            past. Default is today.
          example: '2024-05-21'
        payment_method_id:
          type: string
          description: Id associated with the payment method. Default is the contact's
            most recently used card, if auto charge is true. Default is 0 otherwise.
          example: 789
        allow_tax:
          type: boolean
          description: Only works if the product associated with the product subscription
            is taxable. Default is false.
          example: false
        allow_duplicate:
          type: boolean
          description: If true, it will disable the check to see if there is already
            an identical subscription for the contact. Default is false.
          example: false
        lead_affiliate_id:
          type: string
          description: The affiliate id for the lead of the subscription. Default
            is 0.
          example: 101
        sale_affiliate_id:
          type: string
          description: The affiliate id for the sale of the subscription. Default
            is 0.
          example: 102
        shipping_address:
          $ref: '#/components/schemas/AddressRequest_Detail'
          description: The shipping address for the subscription.
        promo_code:
          type: string
          description: The promo code for the subscription.
          example: PROMO123
        shipping_option_id:
          type: string
          description: The shipping option ID for the subscription.
          example: 123
        reason_stopped:
          type: string
          description: The reason the subscription is no longer active.
          example: Customer requested
      required:
      - contact_id
      - subscription_plan_id
    Address_Detail:
      type: object
      properties:
        country:
          type: string
          deprecated: true
          description: Deprecated. The long-name descriptive version of the Country
            Code. Please use 'country_code' for POST/PATCH operations.
          example: United States of America
        line1:
          type: string
          description: Street address line 1
          example: 123
        line2:
          type: string
          description: Street address line 2
          example: Suite 100
        locality:
          type: string
          description: The municipality to which the address belongs
          example: Phoenix
        region:
          type: string
          deprecated: true
          description: The long-name descriptive version of the Region Code. Please
            use 'region_code' for POST/PATCH operations.
          example: Arizona
        field:
          type: string
          description: Address type field
          enum:
          - ADDRESS_FIELD_UNSPECIFIED
          - BILLING
          - SHIPPING
          - OTHER
          example: BILLING
        country_code:
          type: string
          description: An ISO 3166-2 Country Code (https://en.wikipedia.org/wiki/ISO_3166-1_alpha-3)
          example: USA
        postal_code:
          type: string
