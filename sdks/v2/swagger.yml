          type: string
          description: The URL of the thank you page for this webform
          example: https://thryv.com/thank-you
        duplicate_check_option:
          type: string
          description: The option that determines if the lead submitted through the
            form is a duplicate or not. If it's a duplicate, then the lead will be
            merged with the existing contact record
          enum:
          - EMAIL
          - EMAIL_AND_NAME
          - EMAIL_AND_NAME_AND_COMPANY
          - NO_CHECK
          example: EMAIL
        exit_option:
          type: string
          description: The option that determines what happens after the form is submitted
          enum:
          - REDIRECT
          - FUNNEL_LINK
          - HOSTED
          - LANDING_PAGE
          - WEB_FORM
          - SURVEY
          - UPDATE
          - UPDATE_OPT_OUT
          - OPT_OUT
          - CONFIRM
          - MESSAGE
          - AUTHORING_MESSAGE
          - MANUAL
          - CLOSE
          - DISPLAY_TEXT_AND_BUTTON
          - ERROR
          - HOSTED_PAGE
          example: REDIRECT
        webform_type:
          type: string
          description: The type of webform this is
          enum:
          - LEGACY
          - STANDALONE
          - FUNNEL
          - LANDING_PAGE
          - SURVEY
          - INTERNAL
          - TWITTER
          - UNKNOWN
          example: STANDALONE
        create_time:
          type: string
          format: date-time
          description: When the webform was created
          example: '2024-01-15T10:30:00Z'
        update_time:
          type: string
          format: date-time
          description: When the webform was last updated
          example: '2024-06-20T14:45:00Z'
