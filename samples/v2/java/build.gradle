plugins {
    id 'java'
}

repositories {
    mavenLocal()
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.7.1'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.7.1'

    implementation 'com.keap.core:keap-sdk-core-v2:2.0.1'
    testImplementation 'com.keap.core:keap-sdk-core-v2:2.0.1'
}

tasks.named('test', Test) {
    useJUnitPlatform()

    maxHeapSize = '1G'

    testLogging {
        events "passed", "failed"
    }
}
